<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polkup — Experiencia Digital</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #364a9a; }
    
    body, html {
      width: 100%;
      height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow: hidden; /* Evita que la página tenga scroll */
      background-color: #000; /* Fondo negro por si el video carga un segundo tarde */
    }

    /* Botón flotante para regresar al Landing Page */
    .back-btn {
      position: absolute;
      top: 2rem;
      left: 2rem;
      background: rgba(255, 255, 255, 0.9);
      color: var(--blue);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.6rem 1.5rem;
      border-radius: 999px;
      z-index: 100; /* Asegura que el botón siempre esté sobre el video */
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .back-btn:hover {
      transform: translateX(-3px);
      background: white;
    }

    /* El video a pantalla completa */
    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* Hace que el video llene toda la pantalla sin achatarse */
      z-index: 1;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← Volver al inicio</a>

  <video class="bg-video" autoplay loop muted playsinline>
    <source src="assets/cta-bg-loop.mp4" type="video/mp4">
  </video>

</body>
</html>
