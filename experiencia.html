<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    (function () {
      var V = '20260701';
      if (new URLSearchParams(location.search).get('v') !== V) {
        var u = new URL(location.href);
        u.searchParams.set('v', V);
        location.replace(u.toString());
      }
    })();
  </script>
  <title>Polkup — Experiencia</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="experiencia.css?v=20260701">
</head>
<body>

  <!-- ── Transición de carga: ruleta que gira y se expande ───────
       Reemplaza al video de transición. Para volver al video,
       descomenta el bloque #video-transition de abajo y revierte
       runRouletteTransition() por el flujo de video en experiencia.js -->
  <div id="roulette-transition" aria-hidden="true">
    <div class="rt-ring-wrap">
      <div id="rt-ring" class="roulette-ring"></div>
    </div>
  </div>

  <!-- ── Video de transición desde el landing (desactivado) ──────
  <div id="video-transition">
    <video id="transition-video" autoplay muted playsinline>
      <source src="assets/transiciónapageperimental.mp4" type="video/mp4">
    </video>
  </div>
  -->

  <!-- ← Volver -->
  <a href="index.html?from=exp" class="back-btn" aria-label="Volver">&#8592;</a>

  <!-- ── Hint rotación ─────────────────────────────────────── -->
  <div id="rotate-hint" class="hidden" aria-hidden="true">
    <div class="rotate-arrow rotate-arrow--left">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none"><path d="M26 8a13 13 0 1 0 2.5 7.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M28.5 6.5 28.5 15.5 19.5 15.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>arrastra</span>
    </div>
    <div class="rotate-arrow rotate-arrow--right">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none"><path d="M12 8a13 13 0 1 1-2.5 7.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M9.5 6.5 9.5 15.5 18.5 15.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>arrastra</span>
    </div>
  </div>

  <!-- HUD: nivel / color / pasos -->
  <div id="game-hud" class="game-hud">
    <div class="hud-item">
      <span class="hud-label">Nivel</span>
      <span id="hud-level-num" class="hud-value">0</span>
    </div>
    <div class="hud-item hud-color-item">
      <div id="hud-color-dot" class="hud-color-dot"></div>
      <span id="hud-color-text" class="hud-value">—</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Pasos</span>
      <span id="hud-steps-num" class="hud-value">0</span>
    </div>
  </div>

  <!-- ── Intro Overlay ──────────────────────────────────────── -->
  <div id="intro-overlay" class="modal-overlay hidden">
    <div class="modal">
      <p class="modal-title intro-brand">PolkUp</p>
      <p class="modal-subtitle">Ancla y asciende hasta la cima.<br>La ruleta elige tu color en cada turno.</p>
      <p class="sound-hint">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
        <span>Para una mejor experiencia activa el sonido.</span>
      </p>
      <button id="btn-start" class="btn-start">Comenzar</button>
    </div>
  </div>

  <!-- ── Ruleta — anillo de 8 puntos ──────────────────────── -->
  <div id="roulette-overlay" class="modal-overlay hidden">
    <div class="modal">
      <p class="roulette-label">—</p>
      <p class="modal-subtitle roulette-sub">el color que debes alcanzar</p>
      <div class="roulette-ring-wrap">
        <!-- 8 puntos creados por JS en buildRouletteRing() -->
        <div id="roulette-ring" class="roulette-ring"></div>
        <div class="roulette-pointer"></div>
      </div>
      <p id="roulette-result" class="roulette-result"></p>
    </div>
  </div>

  <!-- ── Modal Condición ───────────────────────────────────── -->
  <div id="condition-modal" class="modal-overlay hidden">
    <div id="modal-card" class="modal">
      <p id="modal-icon" class="modal-icon"></p>
      <p id="modal-title" class="modal-title-large"></p>
      <p id="modal-text" class="modal-subtitle"></p>
      <p id="modal-action-hint" class="modal-hint"></p>
      <button id="modal-btn" class="btn-continue">Continuar</button>
    </div>
  </div>

  <!-- ── Victoria ──────────────────────────────────────────── -->
  <div id="victory-overlay" class="win-overlay hidden">
    <div class="victory-content">
      <h1 class="win-title">¡Llegaste a la cima!</h1>
      <p class="win-subtitle">Has completado la experiencia PolkUp</p>
      <p class="win-steps">Completado en <span id="stat-steps">0</span> pasos</p>
      <button id="btn-restart" class="btn-restart">Jugar de nuevo</button>
    </div>
  </div>

  <!-- ── Escena del juego (espacio 3D) ────────────────────── -->
  <div id="game-scene" class="hidden">
    <div id="tower-scene"></div>
  </div>

  <!-- ── Rope SVG: overlay 2D fijo, fuera del espacio 3D ── -->
  <svg id="rope-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <filter id="rope-shadow">
        <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.18)"/>
      </filter>
    </defs>
  </svg>

  <!-- GSAP (requerido por el motor del juego) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="experiencia.js?v=20260701"></script>
</body>
</html>
